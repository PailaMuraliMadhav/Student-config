spring.application.name=API-Gateway
server.port=8080

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
# Add this line to specify the branch
spring.cloud.config.server.git.default-label=main

# Config Server (Spring Boot 2.4+ requires explicit import)
spring.config.import=configserver:
spring.cloud.config.uri=http://localhost:8888

spring.security.user.name=admin
spring.security.user.password=admin123

# Gateway routes
spring.cloud.gateway.server.webflux.routes[0].id=studentedu-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://STUDENTEDUSERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/studentedu/**,/auth/**

spring.cloud.gateway.server.webflux.routes[1].id=attendance-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://ATTENDANCESERVICE
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/attendance/**

spring.cloud.gateway.server.webflux.routes[2].id=resultedu-service
spring.cloud.gateway.server.webflux.routes[2].uri=lb://RESULTEDUSERVICE
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/resultedu/**


jwt.secret=${JWT_SECRET:bXlTZWNyZXRLZXlGb3JFZHVDb21tZXJjZUFwcGxpY2F0aW9u}

management.endpoints.web.exposure.include=*
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${ZIPKIN_URL:http://localhost:9411/api/v2/spans}

logging.level.org.springframework.cloud.gateway=DEBUG


